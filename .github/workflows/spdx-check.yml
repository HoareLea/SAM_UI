name: SPDX + Copyright header check

on:
  pull_request:
  workflow_dispatch:

jobs:
  spdx:
    if: github.repository_owner == 'SAM-BIM'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository (manual runs only)
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check SPDX + copyright header in changed .cs files
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Repository: ${{ github.repository }}"
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo

          spdx_re='SPDX-License-Identifier:[[:space:]]*LGPL-3\.0-or-later'
          cr_re='Copyright[[:space:]]*\(c\)[[:space:]]*2020[[:space:]]*[-–—][[:space:]]*2026[[:space:]]*Michal[[:space:]]+Dengusiak[[:space:]]*&[[:space:]]*Jakub[[:space:]]+Ziolkowski[[:space:]]+and[[:space:]]+contributors'

          missing=()
          files=()

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR: $PR"
            echo "Head SHA: $HEAD_SHA"
            echo

            mapfile -t files < <(
              gh api "repos/$REPO/pulls/$PR/files" --paginate \
                --jq '.[] | .filename | select(endswith(".cs"))'
            )

            if [ "${#files[@]}" -eq 0 ]; then
              echo "No C# files changed."
              exit 0
            fi

            echo "C# files changed in PR:"
            printf ' - %s\n' "${files[@]}"
            echo

            for f in "${files[@]}"; do
              echo "Checking: $f"

              case "$f" in
                */Properties/*)
                  echo "  Skipping Properties/*"
                  continue
                  ;;
              esac

              content_b64=$(gh api "repos/$REPO/contents/$f?ref=$HEAD_SHA" --jq '.content' 2>/dev/null || true)
              if [ -z "$content_b64" ]; then
                echo "  Could not fetch file content"
                missing+=("$f (unreadable)")
                continue
              fi

              decoded=$(printf '%s' "$content_b64" | base64 -d)
              headblock=$(printf '%s' "$decoded" | sed '1s/^\xEF\xBB\xBF//' | tr -d '\r' | sed -n '1,80p')

              if ! printf '%s' "$headblock" | grep -Eiq "$spdx_re"; then
                echo "  Missing SPDX line in first 80 lines"
                missing+=("$f (SPDX)")
                continue
              fi

              if ! printf '%s' "$headblock" | grep -Eiq "$cr_re"; then
                echo "  Missing copyright line in first 80 lines"
                missing+=("$f (Copyright)")
                continue
              fi

              echo "  OK"
            done

          else
            HEAD="${{ github.sha }}"
            BASE="$(git rev-parse "${HEAD}^" 2>/dev/null || true)"

            echo "Manual run mode"
            echo "Base SHA: ${BASE:-<none>}"
            echo "Head SHA: $HEAD"
            echo

            if [ -z "${BASE:-}" ]; then
              mapfile -t files < <(git ls-files '*.cs')
            else
              mapfile -t files < <(git diff --diff-filter=ACMR --name-only "$BASE" "$HEAD" -- '*.cs' || true)
            fi

            if [ "${#files[@]}" -eq 0 ]; then
              echo "No C# files changed."
              exit 0
            fi

            echo "C# files checked in manual run:"
            printf ' - %s\n' "${files[@]}"
            echo

            for f in "${files[@]}"; do
              echo "Checking: $f"

              case "$f" in
                */Properties/*)
                  echo "  Skipping Properties/*"
                  continue
                  ;;
              esac

              if [ ! -f "$f" ]; then
                echo "  Missing local file"
                missing+=("$f (unreadable)")
                continue
              fi

              headblock="$(head -n 80 "$f" | sed '1s/^\xEF\xBB\xBF//' | tr -d '\r')"

              if ! printf '%s' "$headblock" | grep -Eiq "$spdx_re"; then
                echo "  Missing SPDX line in first 80 lines"
                missing+=("$f (SPDX)")
                continue
              fi

              if ! printf '%s' "$headblock" | grep -Eiq "$cr_re"; then
                echo "  Missing copyright line in first 80 lines"
                missing+=("$f (Copyright)")
                continue
              fi

              echo "  OK"
            done
          fi

          echo
          if [ "${#missing[@]}" -ne 0 ]; then
            echo "Missing required header in:"
            printf ' - %s\n' "${missing[@]}"
            echo
            echo "Expected somewhere in first 80 lines:"
            echo "// SPDX-License-Identifier: LGPL-3.0-or-later"
            echo "// Copyright (c) 2020-2026 Michal Dengusiak & Jakub Ziolkowski and contributors"
            exit 1
          fi

          echo "SPDX + copyright headers OK."